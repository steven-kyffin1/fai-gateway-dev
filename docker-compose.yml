version: '3.8'

services:
  mqtt:
    image: eclipse-mosquitto:latest
    container_name: fai-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  nodered:
    image: nodered/node-red:latest
    container_name: fai-nodered
    restart: unless-stopped
    environment:
      - TZ=Europe/London # Sets your local time for logs
    depends_on:
      - mqtt
    ports:
      - "1880:1880"
    volumes:
      - ./node-red-data:/data
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0" # Maps your Tinymesh USB-TTL to the container